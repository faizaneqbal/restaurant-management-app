<!DOCTYPE html>
<html lang="en">
<head>
    <title>Restaurant App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Restaurant Management</h1>

    <!-- Form -->
    <div class="card p-4 mb-4">
        <div class="row g-3">

            <div class="col-md-3">
                <input type="number" id="price" class="form-control" placeholder="Enter Price">
            </div>

            <div class="col-md-3">
                <input type="text" id="dish" class="form-control" placeholder="Enter Dish">
            </div>

            <div class="col-md-3">
                <select id="table" class="form-select">
                    <option value="table1">Table 1</option>
                    <option value="table2">Table 2</option>
                    <option value="table3">Table 3</option>
                </select>
            </div>

            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="addOrder()">Add to Bill</button>
            </div>

        </div>
    </div>

    <!-- Orders Section -->
    <h3>Orders</h3>

    <div class="row">

        <div class="col-md-4">
            <h5>Table 1</h5>
            <ul id="table1" class="list-group"></ul>
        </div>

        <div class="col-md-4">
            <h5>Table 2</h5>
            <ul id="table2" class="list-group"></ul>
        </div>

        <div class="col-md-4">
            <h5>Table 3</h5>
            <ul id="table3" class="list-group"></ul>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="script.js"></script>

</body>
</html>
